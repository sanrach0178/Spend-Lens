version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: spendlens-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-spendlens_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-spendlens_password}
      POSTGRES_DB: ${DB_NAME:-spendlens_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
